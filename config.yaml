# ══════════════════════════════════════════════════════════════
# AS Code — Main Configuration
# ══════════════════════════════════════════════════════════════
# by Alpha Software

app:
  name: "AS Code"
  version: "0.1.0"
  description: "Fast, lightweight, general-purpose local AI runtime for real hardware"

# Server configuration
server:
  host: "127.0.0.1"
  port: 8000
  log_level: "INFO"

# Model definitions
models:
  reasoning:
    id: "deepseek-r1-1.5b"
    file: "deepseek-r1-1.5b"
    type: "reasoning"
    params_billions: 1.5
    estimated_vram_mb: 1200
    quantization: "int4"
    capabilities:
      - reasoning
      - planning
      - debugging
      - analysis
      - chain-of-thought
    source: "https://huggingface.co/litert-community/DeepSeek-R1-Distill-Qwen-1.5B"

  coding:
    id: "gemma-4-e2b"
    file: "gemma-4-e2b"
    type: "coding"
    params_billions: 2.0
    estimated_vram_mb: 1500
    quantization: "int4"
    capabilities:
      - coding
      - generation
      - implementation
      - refactoring
      - optimization
    source: "https://huggingface.co/litert-community/gemma-4-E2B-it-litert-lm"

# Provider configuration
providers:
  active: "litert_cli"

  litert_cli:
    backend: "gpu"
    enable_speculative_decoding: true

  litert_compiled:
    # Stub — requires ai-edge-litert + DirectXShaderCompiler
    enabled: false

# Hardware-adaptive profiles
profiles:
  ultra_light:
    context_size: 512
    quantization: "int4"
    max_vram_mb: 1500
    active_model_policy: "single"
    swap_strategy: "aggressive"
    batch_size: 1
    concurrent_requests: 1
    kv_cache_max_mb: 128
    model_unload_timeout_sec: 120
    enable_speculative: false

  balanced:
    context_size: 2048
    quantization: "int4"
    max_vram_mb: 3200
    active_model_policy: "single"
    swap_strategy: "smart"
    batch_size: 1
    concurrent_requests: 1
    kv_cache_max_mb: 512
    model_unload_timeout_sec: 300
    enable_speculative: true

  performance:
    context_size: 4096
    quantization: "int8"
    max_vram_mb: 7000
    active_model_policy: "multi"
    swap_strategy: "none"
    batch_size: 4
    concurrent_requests: 4
    kv_cache_max_mb: 2048
    model_unload_timeout_sec: 600
    enable_speculative: true

# Inference defaults
inference:
  temperature: 0.7
  max_tokens: 1024
  top_k: 40
  top_p: 0.95
  max_context_length: 2048
